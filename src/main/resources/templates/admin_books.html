<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>图书管理</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>📚 图书管理</h2>

<hr>

<!-- 新增图书 -->
<h4>新增图书</h4>

<form action="/admin/book/add" method="post" class="row g-2">

<input name="name" class="form-control col" placeholder="书名" required>
<input name="author" class="form-control col" placeholder="作者" required>
<input name="category" class="form-control col" placeholder="分类">

<input name="description" class="form-control col" placeholder="简介">

<button class="btn btn-success col-md-2">添加</button>

</form>

<hr>

<!-- 图书列表 -->
<h4>图书列表</h4>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>书名</th>
<th>作者</th>
<th>分类</th>
<th>操作</th>
</tr>

<tr th:each="book : ${books}">

<td th:text="${book.id}"></td>
<td th:text="${book.name}"></td>
<td th:text="${book.author}"></td>
<td th:text="${book.category}"></td>

<td>

<!-- 编辑 -->
<a class="btn btn-warning btn-sm"
th:href="@{/admin/book/edit/{id}(id=${book.id})}">
编辑
</a>

<!-- 删除 -->
<form action="/admin/book/delete"
method="post"
style="display:inline">

<input type="hidden" name="id" th:value="${book.id}">

<button class="btn btn-danger btn-sm"
onclick="return confirm('确定删除？')">

删除

</button>

</form>

</td>

</tr>

</table>

<a href="/admin" class="btn btn-dark">返回</a>

</div>

</body>
</html>
