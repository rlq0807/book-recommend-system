<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>逾期未归还</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>⏰ 逾期未归还</h2>

<table class="table table-bordered">

<tr>
<th>用户ID</th>
<th>图书ID</th>
<th>借阅时间</th>
<th>截止时间</th>
<th>已逾期天数</th>
</tr>

<tr th:each="r : ${records}">

<td th:text="${r.userId}"></td>
<td th:text="${r.bookId}"></td>
<td th:text="${#temporals.format(r.borrowTime, 'yyyy-MM-dd HH:mm')}"></td>
<td th:text="${#temporals.format(r.dueTime, 'yyyy-MM-dd HH:mm')}"></td>

<td th:text="${T(java.time.Duration).between(r.dueTime, T(java.time.LocalDateTime).now()).toDays()}">
</td>

</tr>

</table>

<a href="/admin" class="btn btn-dark">返回</a>

</div>

</body>
</html>
