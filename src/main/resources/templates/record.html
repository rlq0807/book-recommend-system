<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>借阅记录</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>📊 我的借阅记录</h2>

<a href="/home" class="btn btn-dark mb-4">返回主页</a>

<table class="table">

<tr>

<th>图书ID</th>
<th>借书日期</th>
<th>归还日期</th>
<th>状态</th>
<th>操作</th>

</tr>

<tr th:each="r:${records}">

<td th:text="${r.bookId}"></td>

<td th:text="${r.borrowDate}"></td>

<td th:text="${r.returnDate}"></td>

<td th:text="${r.status}"></td>

<td>

<form action="/borrow/returnBook"
method="post">

<input type="hidden"
name="borrowId"
th:value="${r.id}">

<button class="btn btn-success">

还书

</button>

</form>

</td>

</tr>

</table>

</div>

</body>

</html>
