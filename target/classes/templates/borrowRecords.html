<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>我的借阅记录</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>📚 我的借阅记录</h2>

<hr>

<a href="/home" class="btn btn-dark mb-4">返回主页</a>

<table class="table table-bordered">

<tr>

<th>书名</th>
<th>作者</th>
<th>借阅时间</th>
<th>到期时间</th>
<th>状态</th>
<th>操作</th>

</tr>

<tr th:each="item:${records}" th:classappend="${item.expireStatus == 'overdue' ? 'table-danger' : (item.expireStatus == 'soon' ? 'table-warning' : '')}">

<td th:text="${item.book.name}"></td>
<td th:text="${item.book.author}"></td>
<td th:text="${#temporals.format(item.record.borrowTime, 'yyyy-MM-dd HH:mm')}"></td>
<td th:text="${#temporals.format(item.record.dueTime, 'yyyy-MM-dd HH:mm')}"></td>
<td th:text="${item.record.status}"></td>
<td>

<form action="/borrow/return"
method="post"
style="display:inline">

<input type="hidden"
name="recordId"
th:value="${item.record.id}">

<button class="btn btn-danger btn-sm"
th:if="${item.record.status=='BORROWED'}">

还书

</button>

</form>

<form action="/borrow/renew"
method="post"
style="display:inline">

<input type="hidden"
name="recordId"
th:value="${item.record.id}">

<button class="btn btn-warning btn-sm"
th:if="${item.record.status=='BORROWED'}">

续借

</button>

</form>

</td>

</tr>

</div>

</body>

</html>
