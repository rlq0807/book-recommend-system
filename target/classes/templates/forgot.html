<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>忘记密码</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width:400px;">
<h2>🔑 忘记密码</h2>
<form th:action="@{/forgot}" method="post">
<div class="mb-3">
<input type="text" name="username" class="form-control" placeholder="用户名" required>
</div>
<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="注册邮箱" required>
</div>
<div class="mb-3">
<input type="password" name="newPassword" class="form-control" placeholder="新密码" required>
</div>
<div class="mb-3">
<input type="password" name="confirmPassword" class="form-control" placeholder="确认新密码" required>
</div>
<button class="btn btn-warning w-100">重置密码</button>
</form>
<p class="mt-2 text-danger" th:text="${msg}"></p>
<a href="/login">返回登录</a>
</div>
</body>
</html>
