<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>我的评分</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f5f5;
}
.card{
margin-bottom:15px;
border-radius:10px;
}
</style>

</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<body>

<div class="container mt-4">

<h2>⭐ 我的评分</h2>
<hr>

<a href="/home" class="btn btn-dark mb-4">返回主页</a>

<!-- 已评分 -->
<h4>已评分</h4>

<div th:if="${#lists.isEmpty(ratedList)}" class="text-muted">
暂无评分
</div>

<div th:each="r : ${ratedList}" class="card p-3">

<div class="d-flex justify-content-between align-items-center">

<div>
<b th:text="${r.bookName}"></b>
<br>
当前评分：
<span th:text="${r.score}"></span> ⭐
</div>

<form th:action="@{/rating/rate}" method="post">

<input type="hidden" name="bookId" th:value="${r.bookId}">

<select name="score" class="form-select form-select-sm d-inline w-auto">
<option value="5">★★★★★ 5</option>
<option value="4">★★★★ 4</option>
<option value="3">★★★ 3</option>
<option value="2">★★ 2</option>
<option value="1">★ 1</option>
</select>

<button class="btn btn-warning btn-sm">修改评分</button>

</form>

</div>

</div>

<hr>

<!-- 待评分 -->
<h4>待评分（已归还）</h4>

<div th:if="${#lists.isEmpty(toRateList)}" class="text-muted">
暂无待评分书籍
</div>

<div th:each="book : ${toRateList}" class="card p-3">

<div class="d-flex justify-content-between align-items-center">

<div>
<b th:text="${book.name}"></b>
</div>

<form th:action="@{/rating/rate}" method="post">

<input type="hidden" name="bookId" th:value="${book.id}">

<select name="score" class="form-select form-select-sm d-inline w-auto">
<option value="5">★★★★★ 5</option>
<option value="4">★★★★ 4</option>
<option value="3">★★★ 3</option>
<option value="2">★★ 2</option>
<option value="1">★ 1</option>
</select>

<button class="btn btn-success btn-sm">提交评分</button>

</form>

</div>

</div>

</div>
<div class="toast position-fixed top-0 end-0 m-3" id="successToast">
  <div class="toast-body bg-success text-white">
    提交成功！
  </div>
</div>

</body>
<script>
let params = new URLSearchParams(window.location.search);

if(params.get("msg") === "success"){
    let toastEl = document.getElementById("successToast");
    let toast = new bootstrap.Toast(toastEl);
    toast.show();
}
</script>
</html>
