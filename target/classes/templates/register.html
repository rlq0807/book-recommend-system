<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>注册</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
    .category-card {
        border: 2px solid #e9ecef;
        border-radius: 8px;
        padding: 12px;
        margin: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        background-color: #f8f9fa;
        user-select: none;
    }
    .category-card:hover {
        border-color: #0d6efd;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .category-card.selected {
        border-color: #0d6efd;
        background-color: #e3f2fd;
    }
    .category-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
    }
</style>
</head>
<body>
<div class="container mt-5" style="max-width:600px;">
<h2>📚 注册</h2>
<form th:action="@{/register}" method="post">
<div class="mb-3">
<input type="text" name="username" class="form-control" placeholder="用户名" required>
</div>
<div class="mb-3">
<input type="password" name="password" class="form-control" placeholder="密码" required>
</div>
<div class="mb-3">
<input type="password" name="confirmPassword" class="form-control" placeholder="确认密码" required>
</div>
<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="邮箱" required>
</div>

<!-- 偏好分类选择 -->
<div class="mb-3">
    <label class="form-label">🎯 偏好分类（选填）</label>
    <input type="text" id="categorySearch" class="form-control" placeholder="搜索分类...">
    <div class="category-container" id="categoryContainer"></div>
    <input type="hidden" name="preferredCategories" id="preferredCategories">
    <div class="mt-2" id="selectedPreview" style="font-size: 0.9em; color: #666;"></div>
</div>

<button type="submit" class="btn btn-success w-100">注册</button>
</form>
<p class="mt-2 text-danger" th:text="${msg}"></p>
<a href="/login">返回登录</a>
</div>

<!-- Toast -->
<div class="toast position-fixed top-0 end-0 m-3" id="toast">
  <div class="toast-body text-white" id="toastBody"></div>
</div>

<script th:inline="javascript">
// 存储选中的分类
let selectedCategories = [];
// 存储所有分类
let allCategories = [];
// 存储默认显示的分类
let defaultCategories = [];

// 初始化分类数据
function initCategories() {
    try {
        // 从后端获取分类数据
        allCategories = /*[[${allCategories}]]*/ [];
        defaultCategories = /*[[${categories}]]*/ [];
    } catch (e) {
        console.error('初始化分类数据失败:', e);
    }
}

// 渲染分类卡片
function renderCategories(categories) {
    const categoryContainer = document.getElementById('categoryContainer');
    categoryContainer.innerHTML = '';
    
    categories.forEach(category => {
        const card = document.createElement('div');
        card.className = 'category-card col-4';
        card.dataset.category = category;
        if (selectedCategories.includes(category)) {
            card.classList.add('selected');
        }
        card.onclick = function() { toggleCategory(this); };
        card.innerHTML = `<span>${category}</span>`;
        categoryContainer.appendChild(card);
    });
}

// 显示提示信息
function showToast(message, isError = false) {
    const toastEl = document.getElementById('toast');
    const body = document.getElementById('toastBody');
    
    body.innerText = message;
    body.className = `toast-body text-white ${isError ? 'bg-danger' : 'bg-success'}`;
    
    const toast = new bootstrap.Toast(toastEl, {delay: 2000});
    toast.show();
}

// 切换分类选择状态
function toggleCategory(element) {
    const category = element.dataset.category;
    const index = selectedCategories.indexOf(category);
    
    if (index === -1) {
        // 选中
        if (selectedCategories.length < 5) {
            selectedCategories.push(category);
            element.classList.add('selected');
        } else {
            showToast('最多只能选择5个偏好分类', true);
            return;
        }
    } else {
        // 取消选中
        selectedCategories.splice(index, 1);
        element.classList.remove('selected');
    }
    
    // 更新隐藏字段
    document.getElementById('preferredCategories').value = selectedCategories.join(',');
    
    // 更新预览文本
    updatePreview();
}

// 更新选中的预览文本
function updatePreview() {
    const preview = document.getElementById('selectedPreview');
    if (selectedCategories.length > 0) {
        preview.textContent = '已选择: ' + selectedCategories.join(', ');
    } else {
        preview.textContent = '';
    }
}

// 搜索分类
document.getElementById('categorySearch')?.addEventListener('input', function() {
    const searchTerm = this.value.toLowerCase().trim();
    
    if (searchTerm === '') {
        // 搜索框为空，显示默认的前8个分类
        renderCategories(defaultCategories);
    } else {
        // 过滤并显示分类
        const filteredCategories = allCategories.filter(category => 
            category.toLowerCase().trim().includes(searchTerm)
        );
        renderCategories(filteredCategories);
    }
});

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    initCategories();
    renderCategories(defaultCategories); // 初始化渲染默认分类
});
</script>
</body>
</html>
