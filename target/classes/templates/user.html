<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>用户中心</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f5f5;
}
.card{
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.category-card {
    border: 2px solid #e9ecef;
    border-radius: 8px;
    padding: 12px;
    margin: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: #f8f9fa;
}
.category-card:hover {
    border-color: #0d6efd;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.category-card.selected {
    border-color: #0d6efd;
    background-color: #e3f2fd;
}
.category-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container mt-4">

<h2>👤 用户中心</h2>
<hr>

<a href="/home" class="btn btn-dark mb-4">返回主页</a>

<!-- 用户信息 -->
<div class="card p-3 mb-4">

<h5>基本信息</h5>

<p>用户名：<span th:text="${user.username}"></span></p>
<p>邮箱：<span th:text="${user.email}"></span></p>

</div>

<!-- 修改密码 -->
<div class="card p-3">

<h5>修改密码</h5>

<form th:action="@{/user/changePassword}" method="post">

<div class="mb-2">
<input type="password" name="oldPassword" class="form-control" placeholder="旧密码" required>
</div>

<div class="mb-2">
<input type="password" name="newPassword" class="form-control" placeholder="新密码" required>
</div>

<div class="mb-2">
<input type="password" name="confirmPassword" class="form-control" placeholder="确认新密码" required>
</div>

<button class="btn btn-primary">提交</button>

</form>

</div>

  <div class="card p-3 mt-3">

<h5>修改邮箱</h5>

<form th:action="@{/user/changeEmail}" method="post">

<div class="mb-2">
<input type="email"
       name="email"
       class="form-control"
       placeholder="请输入新邮箱"
       required>
</div>

<button class="btn btn-success">更新邮箱</button>

</form>

</div>

<!-- 修改偏好分类 -->
<div class="card p-3 mt-3">

<h5>🎯 修改偏好分类</h5>

<!-- 显示已选偏好分类 -->
<div class="mb-3">
    <label class="form-label">已选偏好分类：</label>
    <div id="selectedCategoriesDisplay" class="d-flex flex-wrap gap-2">
        <span th:if="${user.preferredCategories == null or user.preferredCategories == ''}" class="text-muted">暂无偏好分类</span>
        <span th:each="category : ${#strings.arraySplit(user.preferredCategories, ',')}" class="badge bg-primary text-white p-2">
            [[${category}]]
        </span>
    </div>
</div>

<form th:action="@{/user/changeCategories}" method="post">

<div class="mb-2">
    <input type="text" id="categorySearch" class="form-control" placeholder="搜索分类...">
    <div class="category-container" id="categoryContainer"></div>
    <input type="hidden" name="preferredCategories" id="preferredCategories">
</div>

<button class="btn btn-primary">更新偏好分类</button>

</form>

</div>

</div>

<!-- Toast -->
<div class="toast position-fixed top-0 end-0 m-3" id="toast">
  <div class="toast-body text-white" id="toastBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
// 存储选中的分类
let selectedCategories = [];
// 存储所有分类
let allCategories = [];
// 存储默认显示的分类
let defaultCategories = [];

// 初始化分类数据
function initCategories() {
    try {
        // 从后端获取分类数据
        allCategories = /*[[${allCategories}]]*/ [];
        defaultCategories = /*[[${categories}]]*/ [];
    } catch (e) {
        console.error('初始化分类数据失败:', e);
    }
}

// 初始化选中的分类
function initSelectedCategories() {
    try {
        const preferredCategories = /*[[${user.preferredCategories}]]*/ null;
        if (preferredCategories && preferredCategories !== "null") {
            selectedCategories = preferredCategories.split(",");
        }
        // 更新隐藏字段
        document.getElementById('preferredCategories').value = selectedCategories.join(',');
    } catch (e) {
        console.error('初始化选中分类失败:', e);
    }
}

// 渲染分类卡片
function renderCategories(categories) {
    const categoryContainer = document.getElementById('categoryContainer');
    categoryContainer.innerHTML = '';
    
    categories.forEach(category => {
        const card = document.createElement('div');
        card.className = 'category-card col-4';
        card.dataset.category = category;
        if (selectedCategories.includes(category)) {
            card.classList.add('selected');
        }
        card.onclick = function() { toggleCategory(this); };
        card.innerHTML = `<span>${category}</span>`;
        categoryContainer.appendChild(card);
    });
}

// 显示提示信息
function showToast(message, isError = false) {
    const toastEl = document.getElementById('toast');
    const body = document.getElementById('toastBody');
    
    body.innerText = message;
    body.className = `toast-body text-white ${isError ? 'bg-danger' : 'bg-success'}`;
    
    const toast = new bootstrap.Toast(toastEl, {delay: 2000});
    toast.show();
}

// 切换分类选择状态
function toggleCategory(element) {
    const category = element.dataset.category;
    const index = selectedCategories.indexOf(category);
    
    if (index === -1) {
        // 选中
        if (selectedCategories.length < 5) {
            selectedCategories.push(category);
            element.classList.add('selected');
        } else {
            showToast('最多只能选择5个偏好分类', true);
            return;
        }
    } else {
        // 取消选中
        selectedCategories.splice(index, 1);
        element.classList.remove('selected');
    }
    
    // 更新隐藏字段
    document.getElementById('preferredCategories').value = selectedCategories.join(',');
}

// 搜索分类
document.getElementById('categorySearch')?.addEventListener('input', function() {
    const searchTerm = this.value.toLowerCase().trim();
    
    if (searchTerm === '') {
        // 搜索框为空，显示默认的前8个分类
        renderCategories(defaultCategories);
    } else {
        // 过滤并显示分类
        const filteredCategories = allCategories.filter(category => 
            category.toLowerCase().trim().includes(searchTerm)
        );
        renderCategories(filteredCategories);
    }
});

// 页面加载完成后初始化
window.addEventListener('DOMContentLoaded', function() {
    initCategories();
    initSelectedCategories();
    renderCategories(defaultCategories); // 关键：初始化渲染默认分类
});

let params = new URLSearchParams(window.location.search);
let msg = params.get("msg");

if(msg){
    let text = "";
    let color = "bg-success";

    if(msg === "success"){
        text = "密码修改成功！";
    }else if(msg === "oldError"){
        text = "旧密码错误！";
        color = "bg-danger";
    }else if(msg === "notMatch"){
        text = "两次密码不一致！";
        color = "bg-warning";
    }else if(msg === "emailSuccess"){
        text = "邮箱修改成功！";
    }else if(msg === "emailEmpty"){
        text = "邮箱不能为空！";
        color = "bg-warning";
    }else if(msg === "emailExist"){
    text = "邮箱已被使用！";
    color = "bg-danger";
}else if(msg === "categoriesSuccess"){
    text = "偏好分类更新成功！";
    color = "bg-success";
}

    let toastEl = document.getElementById("toast");
    let body = document.getElementById("toastBody");

    body.innerText = text;
    body.className = "toast-body text-white " + color;

    let toast = new bootstrap.Toast(toastEl, {delay:2000});
    toast.show();
}
</script>

</body>
</html>
