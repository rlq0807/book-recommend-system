<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>用户中心</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f5f5;
}
.card{
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="container mt-4">

<h2>👤 用户中心</h2>
<hr>

<a href="/home" class="btn btn-dark mb-4">返回主页</a>

<!-- 用户信息 -->
<div class="card p-3 mb-4">

<h5>基本信息</h5>

<p>用户名：<span th:text="${user.username}"></span></p>
<p>邮箱：<span th:text="${user.email}"></span></p>

</div>

<!-- 修改密码 -->
<div class="card p-3">

<h5>修改密码</h5>

<form th:action="@{/user/changePassword}" method="post">

<div class="mb-2">
<input type="password" name="oldPassword" class="form-control" placeholder="旧密码" required>
</div>

<div class="mb-2">
<input type="password" name="newPassword" class="form-control" placeholder="新密码" required>
</div>

<div class="mb-2">
<input type="password" name="confirmPassword" class="form-control" placeholder="确认新密码" required>
</div>

<button class="btn btn-primary">提交</button>

</form>

</div>

  <div class="card p-3 mt-3">

<h5>修改邮箱</h5>

<form th:action="@{/user/changeEmail}" method="post">

<div class="mb-2">
<input type="email"
       name="email"
       class="form-control"
       placeholder="请输入新邮箱"
       required>
</div>

<button class="btn btn-success">更新邮箱</button>

</form>

</div>

</div>

<!-- Toast -->
<div class="toast position-fixed top-0 end-0 m-3" id="toast">
  <div class="toast-body text-white" id="toastBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
let params = new URLSearchParams(window.location.search);
let msg = params.get("msg");

if(msg){
    let text = "";
    let color = "bg-success";

    if(msg === "success"){
        text = "密码修改成功！";
    }else if(msg === "oldError"){
        text = "旧密码错误！";
        color = "bg-danger";
    }else if(msg === "notMatch"){
        text = "两次密码不一致！";
        color = "bg-warning";
    }else if(msg === "emailSuccess"){
        text = "邮箱修改成功！";
    }else if(msg === "emailEmpty"){
        text = "邮箱不能为空！";
        color = "bg-warning";
    }else if(msg === "emailExist"){
    text = "邮箱已被使用！";
    color = "bg-danger";
}

    let toastEl = document.getElementById("toast");
    let body = document.getElementById("toastBody");

    body.innerText = text;
    body.className = "toast-body text-white " + color;

    let toast = new bootstrap.Toast(toastEl, {delay:2000});
    toast.show();
}
</script>

</body>
</html>
